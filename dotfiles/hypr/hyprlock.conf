# GENERAL
general {
    disable_loading_bar = true
    hide_cursor = true
}

# BACKGROUND
background {
    monitor =
    path = ~/.config/hypr/Pictures/night-sky.jpg
    blur_passes = 2
    color = rgb(0D1017)
}

# TIME
label {
    monitor =
    text = cmd[update:30000] echo "$(date +"%R")"
    color = rgb(7AA2F7)
    font_size = 90
    font_family = $font
    position = -30, 0
    halign = right
    valign = top
}

# DATE 
label {
    monitor = 
    text = cmd[update:43200000] echo "$(date +"%A, %d %B %Y")"
    color = rgb(7AA2F7)
    font_size = 25
    font_family = $font
    position = -30, -150
    halign = right
    valign = top
}

# USER
label {
    monitor =
    text = 󰀄 $USER
    color = rgb(7AA2F7)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 35
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 4
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(7AA2F7)
    inner_color = rgb(131721)
    font_color = rgb(7AA2F7)
    fade_on_empty = false
    placeholder_text = <span foreground="##7AA2F7">󰌾  Input Password</span>
    hide_input = false
    check_color = rgb(95E6CB)
    fail_color = rgb(F07178)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgb(F07178)
    position = 0, -35
    halign = center
    valign = center
}
